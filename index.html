<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="piano-container">
  <div class="piano-keyboard">
    <div class="key white" data-note="C" id="btn-1" onclick="sound1()"></div>
    <div class="key black" data-note="C#" id="btn-2" onclick="sound2()"></div>
    <div class="key white" data-note="D" id="btn-3" onclick="sound3()"></div>
    <div class="key black" data-note="D#" id="btn-4"onclick="sound4()"></div>
    <div class="key white" data-note="E" id="btn-5" onclick="sound5()"></div>
    <div class="key white" data-note="F" id="btn-6" onclick="sound6()"></div>
    <div class="key black" data-note="F#" id="btn-7" onclick="sound7()"></div>
    <div class="key white" data-note="G" id="btn-8" onclick="sound8()"></div>
    <div class="key black" data-note="G#" id="btn-9" onclick="sound9()"></div>
    <div class="key white" data-note="A" id="btn-10" onclick="sound10()"></div>
    <div class="key black" data-note="A#" id="btn-11" onclick="sound11()"></div>
    <div class="key white" data-note="B" id="btn-12" onclick="sound12()"></div>
    <div class="key white" data-note="C2" id="btn-13" onclick="sound13()"></div>
  </div>
</div>
    <script src="app.js"></script>
</body>
</html>
